prometheus:
  prometheusSpec:
    retention: 15d

    scrapeInterval: 15s

    evaluationInterval: 15s

    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m

    serviceMonitorSelector: {}

grafana:
  enabled: true

alertmanager:
  enabled: true
